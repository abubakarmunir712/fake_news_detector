version: '3.8'

services:
  truthlens:
    build: .
    image: truthlens:latest
    container_name: truthlens
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
